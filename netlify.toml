# Static HTML site (Redox template) — no build step, publish the repo root.
[build]
  publish = "."

# Le CSS change souvent : toujours revalider (pas de cache figé).
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images, polices et librairies : quasi statiques -> cache long.
[[headers]]
  for = "/assets/imgs/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/assets/webfonts/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/assets/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
